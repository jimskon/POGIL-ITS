# ============================================
# h5klinmik01.user.ki.se (NO RUNNER) - nginx
# Static: /opt/POGIL-ITS/client/dist
# API:    http://127.0.0.1:4000
# ============================================

# --- 80: redirect to HTTPS + allow ACME challenges ---
server {
  listen 80;
  listen [::]:80;
  server_name h5klinmik01.user.ki.se;

  location /.well-known/acme-challenge/ { root /var/www/html; }
  location / { return 301 https://$host$request_uri; }
}

# --- 443: main site ---
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name h5klinmik01.user.ki.se;

  # --- Let's Encrypt certs (update after you run certbot) ---
  ssl_certificate     /etc/letsencrypt/live/h5klinmik01.user.ki.se/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/h5klinmik01.user.ki.se/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  # ---- STATIC: Vite build ----
  root /opt/POGIL-ITS/client/dist;
  index index.html;

  # ---- API reverse proxy ----
  location /api/ {
    proxy_pass         http://127.0.0.1:4000/api/;
    proxy_http_version 1.1;

    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # WebSocket upgrade headers (harmless for normal HTTP)
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";

    proxy_read_timeout 600s;
  }

  # ---- Socket.IO (keep if your app uses it; otherwise delete this block) ----
  location ^~ /socket.io/ {
    proxy_pass http://127.0.0.1:4000/socket.io/;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_buffering off;
  }

  # ---- SPA fallback (React Router) ----
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ---- Security / misc ----
  client_max_body_size 25m;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
}
